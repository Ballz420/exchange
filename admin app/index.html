<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASEM Market Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ========== AUTH CONTAINER ========== -->
  <div id="authContainer" class="auth-container"></div>

  <!-- ========== APP SHELL ========== -->
  <div id="appShell" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span>FASEM</span>
        <small>Market Admin</small>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="dashboard" onclick="navigateTo('dashboard')" title="Dashboard">
          <span class="nav-icon">&#9632;</span><span class="nav-label"> Dashboard</span>
        </button>
        <button class="nav-btn" data-view="users" onclick="navigateTo('users')" title="User Management">
          <span class="nav-icon">&#9783;</span><span class="nav-label"> Users</span>
        </button>
        <button class="nav-btn" data-view="companies" onclick="navigateTo('companies')" title="Company Management">
          <span class="nav-icon">&#9881;</span><span class="nav-label"> Companies</span>
        </button>
        <button class="nav-btn" data-view="instruments" onclick="navigateTo('instruments')" title="Instrument Management">
          <span class="nav-icon">&#9881;</span><span class="nav-label"> Instruments</span>
        </button>
        <a href="/broker" target="_blank" class="nav-btn" style="display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--accent-blue);padding:10px 20px;font-size:13px;cursor:pointer;text-decoration:none;border-left:3px solid transparent;font-family:var(--font)" title="Open Broker Portal">
          <span class="nav-icon" style="font-size:16px;width:20px;text-align:center;opacity:0.7">&#8594;</span><span class="nav-label"> Broker Portal</span>
        </a>
        <button class="nav-btn" data-view="orderbook" onclick="navigateTo('orderbook')" title="Order Book">
          <span class="nav-icon">&#9776;</span><span class="nav-label"> Order Book</span>
        </button>
        <button class="nav-btn" data-view="funding" onclick="navigateTo('funding')" title="Funding Console">
          <span class="nav-icon">&#36;</span><span class="nav-label"> Funding</span>
        </button>
        <button class="nav-btn" data-view="orders" onclick="navigateTo('orders')" title="Order Management">
          <span class="nav-icon">&#9776;</span><span class="nav-label"> Orders</span>
        </button>
        <button class="nav-btn" data-view="trades" onclick="navigateTo('trades')" title="Trade Surveillance">
          <span class="nav-icon">&#8644;</span><span class="nav-label"> Trades</span>
        </button>
        <button class="nav-btn" data-view="charts" onclick="navigateTo('charts')" title="Price Charts">
          <span class="nav-icon">&#9889;</span><span class="nav-label"> Charts</span>
        </button>
        <button class="nav-btn" data-view="compliance" onclick="navigateTo('compliance')" title="Compliance">
          <span class="nav-icon">&#9878;</span><span class="nav-label"> Compliance</span>
        </button>
        <button class="nav-btn" data-view="ppumath" onclick="navigateTo('ppumath')" title="PPU Math Calculator">
          <span class="nav-icon">&#8776;</span><span class="nav-label"> PPU Math</span>
        </button>
        <button class="nav-btn" data-view="profit" onclick="navigateTo('profit')" title="Profit Distribution">
          <span class="nav-icon">&#9733;</span><span class="nav-label"> Profit</span>
        </button>
        <button class="nav-btn" data-view="reconciliation" onclick="navigateTo('reconciliation')" title="Reconciliation Dashboard">
          <span class="nav-icon">&#10003;</span><span class="nav-label"> Reconciliation</span>
        </button>
        <button class="nav-btn" data-view="auditlog" onclick="navigateTo('auditlog')" title="Audit Log">
          <span class="nav-icon">&#128196;</span><span class="nav-label"> Audit Log</span>
        </button>
        <button class="nav-btn" data-view="dbexplorer" onclick="navigateTo('dbexplorer')" title="Database Explorer">
          <span class="nav-icon">&#128196;</span><span class="nav-label"> DB Explorer</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser"></div>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-area">

      <!-- HEADER -->
      <header class="app-header">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="header-actions" id="headerActions"></div>
      </header>

      <main class="app-main">

        <!-- Dashboard -->
        <div id="view-dashboard" class="view active"></div>

        <!-- Users -->
        <div id="view-users" class="view"></div>

        <!-- Companies -->
        <div id="view-companies" class="view"></div>

        <!-- Instruments -->
        <div id="view-instruments" class="view"></div>

        <!-- Order Book -->
        <div id="view-orderbook" class="view"></div>

        <!-- Charts -->
        <div id="view-charts" class="view"></div>

        <!-- Funding -->
        <div id="view-funding" class="view"></div>

        <!-- Orders -->
        <div id="view-orders" class="view"></div>

        <!-- Trades -->
        <div id="view-trades" class="view"></div>

        <!-- Compliance -->
        <div id="view-compliance" class="view"></div>

        <!-- PPU Math -->
        <div id="view-ppumath" class="view"></div>

        <!-- Profit -->
        <div id="view-profit" class="view"></div>

        <!-- Reconciliation -->
        <div id="view-reconciliation" class="view"></div>

        <!-- Audit Log -->
        <div id="view-auditlog" class="view"></div>

        <!-- DB Explorer -->
        <div id="view-dbexplorer" class="view"></div>

      </main>
    </div>

  </div>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ========== MODAL CONTAINER ========== -->
  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-card" id="modalContent"></div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  
<script>
window.onerror = function(msg, url, line, col, err) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#ff4d6a;color:#fff;padding:16px;font-family:monospace;font-size:13px;white-space:pre-wrap;border-bottom:3px solid #cc0033';
  el.textContent = 'JS ERROR: ' + msg + ' (line ' + line + ':' + col + ')\n' + (err ? err.stack || '' : '');
  document.body.prepend(el);
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#ffaa00;color:#000;padding:16px;font-family:monospace;font-size:13px;white-space:pre-wrap';
  el.textContent = 'PROMISE ERROR: ' + (e.reason ? e.reason.message || e.reason : e);
  document.body.prepend(el);
});
</script>
<script src="admin.js"></script>

</body>
</html>
