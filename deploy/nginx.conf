upstream fasem_api {
    server 127.0.0.1:8000;
    keepalive 64;
}
server {
    listen 80;
    server_name fasem.com www.fasem.com;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl http2;
    server_name fasem.com www.fasem.com;
    ssl_certificate /etc/letsencrypt/live/fasem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fasem.com/privkey.pem;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    location /api/ { proxy_pass http://fasem_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws/ { proxy_pass http://fasem_api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /broker/ { proxy_pass http://fasem_api; proxy_set_header Host $host; }
    location /admin-panel/ { proxy_pass http://fasem_api; proxy_set_header Host $host; }
    location / { return 301 https://$host/broker/; }
}
